{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
  <h3>Login to EduTrack AI</h3>
  <p class="section-text">Access performance analytics, study reports, and classroom feedback.</p>
  <form method="POST" class="auth-form">
    <label>Email</label>
    <input type="email" name="email" placeholder="name@example.com" required />
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required />
    <button type="submit" class="button-primary">Login</button>
    <p class="helper-text">New to EduTrack? <a href="{{ url_for('register') }}">Create an account</a></p>
    <p class="helper-text"><a href="{{ url_for('forgot_password') }}">Forgot Password?</a></p>
  </form>
</div>
{% endblock %}
