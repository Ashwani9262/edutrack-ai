{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
  <h3>Register for EduTrack AI</h3>
  <p class="section-text">Create a student or teacher account and start tracking progress.</p>
  <form method="POST" class="auth-form">
    <label>Name</label>
    <input type="text" name="name" placeholder="Full name" required />
    <label>Email</label>
    <input type="email" name="email" placeholder="email@example.com" required />
    <label>Password</label>
    <input type="password" name="password" placeholder="Choose a strong password" required />
    <label>College Name</label>
    <input type="text" name="college" placeholder="College or university" required />
    <label>Role</label>
    <select name="role" required onchange="toggleClassSelection(this.value)">
      <option value="">Select role</option>
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
    </select>
    <div id="student-select" class="role-section hidden">
      <label>Class</label>
      <select name="class_id">
        <option value="">Choose a class</option>
        {% for class in classes %}
        <option value="{{ class.id }}">{{ class.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div id="teacher-select" class="role-section hidden">
      <label>Classes</label>
      <div class="checkbox-grid">
        {% for class in classes %}
        <label class="checkbox-item">
          <input type="checkbox" name="class_ids" value="{{ class.id }}" />
          {{ class.name }}
        </label>
        {% endfor %}
      </div>
    </div>
    <button type="submit" class="button-primary">Register</button>
    <p class="helper-text">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
  </form>
</div>
{% endblock %}
