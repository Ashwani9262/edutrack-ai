{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
  <h3>Forgot Password</h3>
  <p class="section-text">Enter your email to receive a password reset link.</p>
  <form method="POST" class="auth-form">
    <label>Email</label>
    <input type="email" name="email" placeholder="name@example.com" required />
    <button type="submit" class="button-primary">Send Reset Link</button>
    <p class="helper-text"><a href="{{ url_for('login') }}">Back to Login</a></p>
  </form>
</div>
{% endblock %}
